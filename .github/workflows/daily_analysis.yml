name: 每日股票分析

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: pip install -r requirements.txt
      
      - name: 执行股票分析
        env:
          # 1. 密钥注入 (供配置文件引用)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          
          # 2. 运行参数
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          LOG_LEVEL: INFO
          MAX_WORKERS: '1'
          NEWS_MAX_AGE_DAYS: '30'
          LITELLM_CONFIG: "./litellm_config.yaml"

        run: |
          # --- A. 还原配置文件 ---
          cat <<EOF > litellm_config.yaml
          ${{ secrets.LITELLM_CONFIG_YAML }}
          EOF

          # --- B. 动态干预数据源 (物理隔离方案) ---
          # 既然代码里 base.py 强制初始化 6 个，我们用脚本强制把 Yfinance 和 Baostock 提到最前面
          # 同时禁用掉会卡住的 Pytdx 和需要 Token 的 Tushare
          export ENABLED_FETCHERS="yfinance,baostock"
          export DATA_SOURCE_PRIORITY="yfinance,baostock"
          
          # 如果你的代码通过环境变量无法彻底禁用，这里执行一个“无损手术”：
          # 临时将 pytdx_fetcher.py 里的初始化逻辑屏蔽 (仅在本次 Action 运行中有效)
          sed -i 's/self.connect()/pass # 屏蔽连接/g' data_provider/pytdx_fetcher.py || true

          echo "🚀 启动分析，当前优先级: $DATA_SOURCE_PRIORITY"
          
          # --- C. 启动主程序 ---
          # 确保 Tushare 不干扰
          unset TUSHARE_TOKEN
          python main.py

      - name: 提交并推送报告
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f reports/* logs/* || true
          if git diff --staged --quiet; then
            echo "没有新报告"
          else
            git commit -m "📊 自动报告: $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin ${{ github.ref_name }}
          fi
