name: 每日股票分析

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options: [full, market-only, stocks-only]

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 执行股票分析
        env:
          # 1. 【核心修正】模型调用前缀
          # 必须加上 gemini/ 前缀，否则 LiteLLM 无法识别 Provider
          LITELLM_MODEL: "gemini/gemini-pro"
          LITELLM_FALLBACK_MODELS: "gemini/gemini-1.5-flash,deepseek/deepseek-chat"
          
          # 2. 【效率修正】数据源物理隔离
          # 只启用 yfinance(美股) 和 baostock(A股名称兜底)，彻底绕过 Pytdx 和 Tushare 的超时逻辑
          ENABLED_FETCHERS: "yfinance,baostock"
          DATA_SOURCE_PRIORITY: "yfinance,baostock"
          
          # 3. 【情报修正】放宽新闻时间窗口
          # 将 10 改为 30，对抗 profile=short 导致的 drop_old 过滤过严问题
          NEWS_MAX_AGE_DAYS: '30'
          SEARCH_TOP_K: '10'

          # 4. API Keys 注入
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          
          # 5. 运行参数
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          LITELLM_CONFIG_YAML: ${{ secrets.LITELLM_CONFIG_YAML }}
          GEMINI_REQUEST_DELAY: '10.0'
          MAX_WORKERS: '1'
          LOG_LEVEL: INFO

        run: |
          # 写入配置文件
          echo "${{ secrets.LITELLM_CONFIG_YAML }}" > litellm_config.yaml

          # 强制清理 Tushare 环境干扰
          unset TUSHARE_TOKEN
          
          # 执行分析（自动处理 mode 输入）
          MODE="${{ github.event.inputs.mode || 'full' }}"
          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review
          else
            python main.py
          fi

      - name: 提交并推送报告
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f reports/* logs/* || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 自动报告: $(date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi
