name: 每日股票分析

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: pip install -r requirements.txt
      
      - name: 执行股票分析
        env:
          # 1. 密钥注入
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          
          # 2. 运行参数
          # 确保环境变量中的 STOCK_LIST 是纯代码列表：PM,ENB,688249,000651...
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          LOG_LEVEL: INFO
          MAX_WORKERS: '1'
          NEWS_MAX_AGE_DAYS: '30'
          LITELLM_CONFIG: "./litellm_config.yaml"

        run: |
          # --- A. 还原配置文件 ---
          cat <<EOF > litellm_config.yaml
          ${{ secrets.LITELLM_CONFIG_YAML }}
          EOF

          # --- B. 屏蔽 Pytdx 延迟 (物理隔离) ---
          # 哪怕以后 mapping 漏了，也要防止 Pytdx 尝试连接服务器导致超长的等待
          sed -i 's/def connect(self):/def connect(self):\n        return False/g' data_provider/pytdx_fetcher.py || true

          # --- C. 优先级与环境清理 ---
          # 只要 STOCK_NAME_MAP 补全了，yfinance 会自动处理美股，baostock 处理 A 股
          export DATA_SOURCE_PRIORITY="yfinance,baostock,efinance"
          unset TUSHARE_TOKEN

          echo "🚀 启动分析，当前代码库已加载手动 Stock Mapping"
          
          # --- D. 启动主程序 ---
          python main.py

      - name: 提交并推送报告
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f reports/* logs/* || true
          if git diff --staged --quiet; then
            echo "没有新报告"
          else
            git commit -m "📊 自动报告: $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin ${{ github.ref_name }}
          fi
