name: 每日分市场股票分析

on:
  schedule:
    # 1. A股分析：北京时间 17:00 (UTC 09:00)
    - cron: '0 9 * * 1-5'
    # 2. 美股分析：美东时间 17:00 (约为 UTC 21:00)
    - cron: '0 21 * * 1-5'
  workflow_dispatch:
    inputs:
      market:
        description: '手动指定运行市场'
        required: true
        default: 'cn'
        type: choice
        options:
          - cn
          - us
          - both

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: pip install -r requirements.txt
      
      - name: 确定当前运行市场
        id: set-market
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "RUN_REGION=${{ github.event.inputs.market }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" == "0 9 * * 1-5" ]; then
            echo "RUN_REGION=cn" >> $GITHUB_ENV
          else
            echo "RUN_REGION=us" >> $GITHUB_ENV
          fi

      - name: 执行股票分析
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          
          MARKET_REVIEW_REGION: ${{ env.RUN_REGION }}
          RAW_STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          
          TZ: 'Asia/Shanghai'
          TRADING_DAY_CHECK_ENABLED: 'false'
          MAX_WORKERS: '1'
          NEWS_MAX_AGE_DAYS: '60'
          LITELLM_CONFIG: "./litellm_config.yaml"
          
          ENABLE_FUNDAMENTAL_PIPELINE: 'true'
          FUNDAMENTAL_STAGE_TIMEOUT_SECONDS: '15'
          FUNDAMENTAL_FETCH_TIMEOUT_SECONDS: '5'
          FUNDAMENTAL_RETRY_MAX: '3'
          
        run: |
          # --- A. 智能物理隔离股票池 (防止跨时区配额浪费) ---
          if [ "$MARKET_REVIEW_REGION" == "us" ]; then
            FILTERED_LIST=$(echo "$RAW_STOCK_LIST" | tr ',' '\n' | grep -i '^[a-z]' | tr '\n' ',' | sed 's/,$//')
            export STOCK_LIST=$FILTERED_LIST
            echo "🇺🇸 美股时段：已剔除纯数字 A 股。当前列表: $STOCK_LIST"
          elif [ "$MARKET_REVIEW_REGION" == "cn" ]; then
            FILTERED_LIST=$(echo "$RAW_STOCK_LIST" | tr ',' '\n' | grep '^[0-9]' | tr '\n' ',' | sed 's/,$//')
            export STOCK_LIST=$FILTERED_LIST
            echo "🇨🇳 A股时段：已剔除美股纯字母。当前列表: $STOCK_LIST"
          else
            export STOCK_LIST=$RAW_STOCK_LIST
          fi

          # --- B. 还原配置 ---
          cat <<EOF > litellm_config.yaml
          ${{ secrets.LITELLM_CONFIG_YAML }}
          EOF

          # --- C. 源码手术 (隔离 Pytdx) ---
          TARGET_PYTDX="data_provider/pytdx_fetcher.py"
          if [ -f "$TARGET_PYTDX" ]; then
            cat <<EOF > $TARGET_PYTDX
          class PytdxFetcher:
              def __init__(self, *args, **kwargs): self.name = "PytdxFetcher"; self.priority = 99
              def connect(self): return False
              def get_stock_name(self, *args, **kwargs): return None
              def get_daily_data(self, *args, **kwargs): return None
          EOF
          fi

          # Yfinance 提权
          TARGET_BASE="data_provider/base.py"
          if [ -f "$TARGET_BASE" ]; then
            sed -i '/self._fetchers.sort(key=lambda f: f.priority)/i \        for f in self._fetchers: (setattr(f, "priority", -1) if f.name == "YfinanceFetcher" else None)' $TARGET_BASE
          fi

          # 禁用 Efinance 名称查询
          TARGET_EFI="data_provider/efinance_fetcher.py"
          if [ -f "$TARGET_EFI" ]; then
             sed -i 's/def get_stock_name/def _disabled_get_stock_name/g' $TARGET_EFI
          fi

          # 注入随机延迟 (20-50秒)
          TARGET_PIPELINE="src/core/pipeline.py"
          if [ -f "$TARGET_PIPELINE" ]; then
            sed -i '/for .* in .*股票列表/a \        import time, random; sleep_time = random.uniform(20, 50); print(f"☕ 深度模式：等待 {sleep_time:.2f} 秒..."); time.sleep(sleep_time)' $TARGET_PIPELINE
          fi

          # --- D. 启动 ---
          python main.py

      - name: 提交并推送报告
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # --- E. 物理重命名防覆盖 + 美东时间校准手术 ---
          if [ -d "reports" ]; then
            for file in reports/*.md; do
              if [ -f "$file" ] && [[ "$file" != *"_CN.md" ]] && [[ "$file" != *"_US.md" ]]; then
                
                if [ "${{ env.RUN_REGION }}" == "cn" ]; then
                  # A股直接打标签
                  mv "$file" "${file%.md}_CN.md"
                  echo "🏷️ 重命名 A 股报告: $file -> ${file%.md}_CN.md"
                
                elif [ "${{ env.RUN_REGION }}" == "us" ]; then
                  # 美股硬核日期校准：从文件名中提取 YYYYMMDD
                  BASENAME=$(basename "$file")
                  # 假设文件名格式包含 8位数字，如 report_20260326.md
                  CURRENT_DATE=$(echo "$BASENAME" | grep -oE '[0-9]{8}')
                  
                  if [ -n "$CURRENT_DATE" ]; then
                    # 借助 Linux date 命令，将抓到的日期减去 1 天
                    CORRECT_DATE=$(date -d "$CURRENT_DATE -1 day" +"%Y%m%d")
                    # 替换旧日期，并加上 _US 后缀
                    NEW_BASENAME=$(echo "$BASENAME" | sed "s/$CURRENT_DATE/$CORRECT_DATE/" | sed 's/\.md/_US.md/')
                    mv "$file" "reports/$NEW_BASENAME"
                    echo "📅 美股日期校准：$BASENAME -> $NEW_BASENAME (已回退至美东收盘日)"
                  else
                    # 如果匹配不到日期格式，走兜底改名
                    mv "$file" "${file%.md}_US.md"
                    echo "🏷️ 美股兜底改名: $file -> ${file%.md}_US.md"
                  fi
                fi

              fi
            done
          fi

          git add -f reports/* logs/* || true
          if git diff --staged --quiet; then
            echo "没有新报告"
          else
            git commit -m "📊 自动报告(${{ env.RUN_REGION }}): $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin ${{ github.ref_name }}
          fi
