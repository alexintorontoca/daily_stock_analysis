name: 每日股票分析

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: pip install -r requirements.txt
      
      - name: 执行股票分析
        env:
          # 【数据源加速】彻底移除 pytdx, tushare, efinance，只留 yfinance 处理美股
          ENABLED_FETCHERS: "yfinance,baostock"
          DATA_SOURCE_PRIORITY: "yfinance,baostock"
          
          # 【新闻时效】拉长窗口，解决 drop_old 导致的新闻缺失
          NEWS_MAX_AGE_DAYS: '30'
          
          # 【密钥注入】供 litellm_config.yaml 中的 os.environ 引用
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          
          # 【运行参数】
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          LOG_LEVEL: INFO
          MAX_WORKERS: '1'
          # 设置配置文件路径环境变量
          LITELLM_CONFIG: "./litellm_config.yaml"

        run: |
          # 1. 处理 LITELLM_CONFIG_YAML：将 Secret 内容还原为物理文件
          # 使用 printf 确保换行符和格式正确
          printf "%s" "${{ secrets.LITELLM_CONFIG_YAML }}" > litellm_config.yaml
          
          echo "==== 已从 Secret 生成配置文件 ===="
          cat litellm_config.yaml
          echo "================================"

          # 2. 强制清理干扰，确保底层逻辑不尝试 Pytdx 连接
          unset TUSHARE_TOKEN
          
          # 3. 运行主程序（程序会自动读取 LITELLM_CONFIG 环境变量指向的文件）
          python main.py

      - name: 提交并推送报告
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f reports/* logs/* || true
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "📊 自动报告: $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin ${{ github.ref_name }}
          fi
