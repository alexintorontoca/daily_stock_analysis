name: 每日股票分析

on:
  schedule:
    # 北京时间早上 06:00 = UTC 22:00 (前一天)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: pip install -r requirements.txt
      
      - name: 执行股票分析
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          LOG_LEVEL: INFO
          MAX_WORKERS: '1'
          NEWS_MAX_AGE_DAYS: '30'
          LITELLM_CONFIG: "./litellm_config.yaml"
        run: |
          # --- A. 还原配置文件 ---
          cat <<EOF > litellm_config.yaml
          ${{ secrets.LITELLM_CONFIG_YAML }}
          EOF

          # --- B. 物理隔离屏蔽 Pytdx ---
          TARGET_PYTDX="data_provider/pytdx_fetcher.py"
          if [ -f "$TARGET_PYTDX" ]; then
            cat <<EOF > $TARGET_PYTDX
          class PytdxFetcher:
              def __init__(self, *args, **kwargs): self.name = "PytdxFetcher"; self.priority = 99
              def connect(self): return False
              def get_stock_name(self, *args, **kwargs): return None
              def get_daily_data(self, *args, **kwargs): return None
          EOF
            echo "✅ Pytdx 已物理屏蔽"
          fi

          # --- C. 优先级深度手术 ---
          TARGET_BASE="data_provider/base.py"
          if [ -f "$TARGET_BASE" ]; then
            # 强制 Yfinance 变成唯一的 P-1，绝对排在 Efinance (P0) 之前
            sed -i '/self._fetchers.sort(key=lambda f: f.priority)/i \        for f in self._fetchers: (setattr(f, "priority", -1) if f.name == "YfinanceFetcher" else None)' $TARGET_BASE
            echo "✅ Yfinance 已提权至 P-1 (全场最高)"
          fi

          # --- D. 屏蔽 Efinance 的名称接口 ---
          # 核心痛点：Efinance 有时会抢占美股代码但返回错误名称，这里直接阉割它的名称查询能力
          TARGET_EFI="data_provider/efinance_fetcher.py"
          if [ -f "$TARGET_EFI" ]; then
             sed -i 's/def get_stock_name/def _disabled_get_stock_name/g' $TARGET_EFI
             echo "✅ 已禁用 Efinance 名称查询功能"
          fi

          # --- E. 启动分析 ---
          unset TUSHARE_TOKEN
          echo "🚀 启动主程序..."
          python main.py

      - name: 提交并推送报告
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f reports/* logs/* || true
          if git diff --staged --quiet; then
            echo "没有新报告"
          else
            git commit -m "📊 自动报告: $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin ${{ github.ref_name }}
          fi
