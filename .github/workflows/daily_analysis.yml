name: 每日股票分析

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options: [full, market-only, stocks-only]
      force_run:
        description: '强制运行'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建必要目录
        run: mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          # 1. 模型配置
          LITELLM_CONFIG_YAML: ${{ secrets.LITELLM_CONFIG_YAML }}
          LITELLM_CONFIG: "litellm_config.yaml"
          LITELLM_MODEL: "gemini-pro"
          LITELLM_FALLBACK_MODELS: "gemini-2.5-flash,deepseek-chat"
          
          # 2. 数据源强制修正 (关键：移除 tushare 和 pytdx)
          # 既然 Tushare 会强行设为 Priority -1 拦截美股，我们直接不启动它
          # A 股将由 baostock (P3) 和 efinance (P0) 稳定接管
          ENABLED_FETCHERS: "yfinance,efinance,baostock,akshare"
          DATA_SOURCE_PRIORITY: "yfinance,efinance,baostock,akshare"
          
          # 3. 搜索与时效 (调优到 10 天，确保 AI 有料)
          NEWS_MAX_AGE_DAYS: '10'
          
          # 4. 核心 API Keys (注意：此处去掉了 TUSHARE_TOKEN 注入)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          
          # 5. 运行参数
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          GEMINI_REQUEST_DELAY: '15.0'
          MAX_WORKERS: '1'
          LOG_LEVEL: INFO

        run: |
          # 安全写入 LiteLLM 配置
          cat <<'EOF' > "$LITELLM_CONFIG"
          ${{ secrets.LITELLM_CONFIG_YAML }}
          EOF

          # 强制清理环境中的 Tushare 痕迹，防止底层代码通过其它路径读取
          unset TUSHARE_TOKEN

          # 执行分析逻辑
          MODE="${{ github.event.inputs.mode || 'full' }}"
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi

          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi

      - name: 提交并推送报告
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f reports/* logs/* || true
          if git diff --staged --quiet; then
            echo "没有新内容需要提交。"
          else
            git commit -m "📊 自动报告: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi
