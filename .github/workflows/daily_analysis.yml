name: 每日股票分析

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options: [full, market-only, stocks-only]
      force_run:
        description: '强制运行'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建必要目录
        run: mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          # 1. LiteLLM 配置 (使用 cat <<'EOF' 确保 100% 正确写入)
          LITELLM_CONFIG_YAML: ${{ secrets.LITELLM_CONFIG_YAML }}
          LITELLM_CONFIG: "litellm_config.yaml"
          LITELLM_MODEL: "gemini-pro"
          LITELLM_FALLBACK_MODELS: "gemini-2.5-flash,deepseek-chat"
          
          # 2. 数据源优化 (不改代码的核心：调整优先级和开关)
          # 将 tushare 挪到最后，yfinance 放在最前处理美股，中间由 efinance/baostock 撑起 A 股
          DATA_SOURCE_PRIORITY: "yfinance,efinance,baostock,akshare,tushare"
          # 彻底移除 pytdx，减少无意义的连接超时等待
          ENABLED_FETCHERS: "yfinance,efinance,baostock,akshare,tushare"
          
          # 3. 业务与搜索参数
          # 增加新闻搜索时效到 10 天，确保 AI 分析有料可看
          NEWS_MAX_AGE_DAYS: '10'
          # 设置搜索倾向，防止过滤太狠（如果你的 search_service 支持此环境变量）
          SEARCH_STRICT_FILTER: "false" 
          
          # 4. API Keys
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          
          # 5. 运行控制
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          GEMINI_REQUEST_DELAY: '15.0'
          MAX_WORKERS: '1'
          LOG_LEVEL: INFO

        run: |
          # 写入配置文件 (修复之前的写入漏洞)
          cat <<'EOF' > "$LITELLM_CONFIG"
          ${{ secrets.LITELLM_CONFIG_YAML }}
          EOF

          if [ -s "$LITELLM_CONFIG" ]; then echo "✅ 配置文件写入成功"; fi

          # 执行分析逻辑
          MODE="${{ github.event.inputs.mode || 'full' }}"
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi

          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi

      - name: 提交并推送报告
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f reports/* logs/* || true
          if git diff --staged --quiet; then
            echo "没有新内容需要提交。"
          else
            git commit -m "📊 自动报告: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi
