name: 每日股票分析

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options: [full, market-only, stocks-only]
      force_run:
        description: '强制运行'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建必要目录
        run: mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          # 加载配置
          LITELLM_CONFIG_YAML: ${{ vars.LITELLM_CONFIG_YAML || secrets.LITELLM_CONFIG_YAML }}
          LITELLM_CONFIG: "litellm_config.yaml"
          
          # 【关键修复点】模型名必须与 YAML 中的 model_name 一致
          LITELLM_MODEL: "gemini-pro"
          # 如果你要指定 fallback，也要用 YAML 里的名字
          LITELLM_FALLBACK_MODELS: "gemini-2.5-flash,deepseek-chat"
          
          # API Keys
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          
          # 频率控制（针对免费额度极其重要）
          GEMINI_REQUEST_DELAY: '12.0'
          MAX_WORKERS: '1'
          
          # 其他业务配置
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          LOG_LEVEL: INFO

        run: |
          # 将环境变量中的 YAML 写入实际文件供 LiteLLM 读取
          if [ -n "$LITELLM_CONFIG_YAML" ]; then
            echo "$LITELLM_CONFIG_YAML" > "$LITELLM_CONFIG"
          fi

          MODE="${{ github.event.inputs.mode || 'full' }}"
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi

          # 启动分析
          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi

      - name: 强制提交报告到仓库
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          mkdir -p reports logs
          
          # 强制添加，无视 .gitignore
          git add -f reports/* logs/* || true
          
          if git diff --staged --quiet; then
            echo "⚠️ 没有新生成的分析报告。"
          else
            git commit -m "📊 自动生成股票报告: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
            echo "✅ 报告已成功推送到仓库 reports/ 文件夹。"
          fi

      - name: 异常归档
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: error-logs
          path: logs/
          retention-days: 5
