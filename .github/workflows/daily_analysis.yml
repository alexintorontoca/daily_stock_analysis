name: 每日股票分析

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options: [full, market-only, stocks-only]
      force_run:
        description: '强制运行'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建必要目录
        run: mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          # 直接引用 Secrets 避免 Shell 变量二次展开的问题
          RAW_CONFIG_YAML: ${{ secrets.LITELLM_CONFIG_YAML }}
          LITELLM_CONFIG: "litellm_config.yaml"
          LITELLM_MODEL: "gemini-pro"
          LITELLM_FALLBACK_MODELS: "gemini-2.5-flash,deepseek-chat"
          DATA_SOURCE_PRIORITY: "yfinance,efinance,akshare,tushare"
          ENABLED_FETCHERS: "yfinance,efinance,akshare,baostock,tushare"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_REQUEST_DELAY: '15.0'
          MAX_WORKERS: '1'
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          NEWS_MAX_AGE_DAYS: '7'
          LOG_LEVEL: INFO

        run: |
          # --- 核心修复：安全写入配置文件 ---
          # 使用 'EOF' (带引号) 可以防止 Shell 尝试解析 YAML 中的 $ 或其他特殊字符
          cat <<'EOF' > "$LITELLM_CONFIG"
          ${{ secrets.LITELLM_CONFIG_YAML }}
          EOF

          # 验证文件是否存在且非空
          if [ -s "$LITELLM_CONFIG" ]; then
            echo "✅ $LITELLM_CONFIG 生成成功"
          else
            echo "❌ $LITELLM_CONFIG 生成失败或内容为空"
            exit 1
          fi

          # 运行逻辑保持不变
          MODE="${{ github.event.inputs.mode || 'full' }}"
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi

          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi

      - name: 提交并推送报告
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f reports/* logs/* || true
          if git diff --staged --quiet; then
            echo "没有新内容需要提交。"
          else
            git commit -m "📊 自动报告: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi
